<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Charstine Resort</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background:
        radial-gradient(circle at 10% 20%, rgba(251, 191, 36, 0.15) 0, transparent 35%),
        radial-gradient(circle at 90% 80%, rgba(14, 165, 233, 0.12) 0, transparent 40%),
        #020617;
    }
  </style>
</head>
<body class="min-h-screen text-slate-100">
  <main class="min-h-[calc(100vh-88px)] flex items-center justify-center px-4 py-10">
    <section class="w-full max-w-md rounded-3xl border border-amber-300/30 bg-slate-900/85 p-6 shadow-2xl shadow-amber-500/10 backdrop-blur md:p-8">
      <div class="mb-6">
        <p class="inline-flex rounded-full border border-amber-200/30 bg-amber-300/10 px-3 py-1 text-xs font-semibold tracking-wide text-amber-200">CHARSTINE ADMIN</p>
        <h1 class="mt-4 text-3xl font-bold text-amber-300">Secure Login</h1>
        <p class="mt-2 text-sm text-slate-300">Authorized admin access only.</p>
      </div>

      <form id="loginForm" class="mt-8 space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-slate-200">Email</label>
          <input id="email" name="email" type="email" required class="mt-1 w-full rounded-xl border border-slate-700 bg-slate-950/80 px-3 py-2.5 text-slate-100 focus:border-amber-400 focus:outline-none" />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-slate-200">Password</label>
          <input id="password" name="password" type="password" required class="mt-1 w-full rounded-xl border border-slate-700 bg-slate-950/80 px-3 py-2.5 text-slate-100 focus:border-amber-400 focus:outline-none" />
        </div>
        <button type="submit" id="submitBtn" class="w-full rounded-xl bg-amber-400 px-4 py-2.5 font-semibold text-slate-950 transition hover:bg-amber-300 disabled:opacity-50 disabled:cursor-not-allowed">Log In</button>
      </form>

      <p id="message" class="mt-4 text-sm"></p>
      <a href="index.html" class="mt-6 inline-block text-sm text-amber-300 transition hover:text-amber-200">Back to website</a>
    </section>
  </main>

  <footer class="border-t border-amber-300/20 bg-slate-900/75 px-4 py-4 text-center text-xs text-slate-300">
    © 2026 Charstine Eco-Tourist Resort | Call/WhatsApp: 0790139460 | charstinehotelresort@gmail.com
  </footer>

  <script>
    const form = document.getElementById('loginForm');
    const message = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    // Check if already logged in
    async function checkSession() {
      try {
        const response = await fetch('/api/admin-session');
        if (response.ok) {
          const data = await response.json();
          if (data.authenticated) {
            window.location.replace('/admin-dashboard.html');
          }
        }
      } catch (error) {
        console.error('Session check error:', error);
      }
    }

    checkSession();

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.textContent = '';
      message.className = 'mt-4 text-sm';
      submitBtn.disabled = true;

      const email = String(form.email.value || '').trim().toLowerCase();
      const password = String(form.password.value || '');

      if (!email || !password) {
        message.textContent = 'Please enter both email and password.';
        message.classList.add('text-red-400');
        submitBtn.disabled = false;
        return;
      }

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (response.ok && data.success) {
          message.textContent = 'Login successful. Redirecting...';
          message.classList.add('text-green-400');
          setTimeout(() => {
            window.location.replace('/admin-dashboard.html');
          }, 500);
        } else {
          message.textContent = data.error || 'Login failed. Please try again.';
          message.classList.add('text-red-400');
          submitBtn.disabled = false;
        }
      } catch (error) {
        console.error('Login error:', error);
        message.textContent = 'An error occurred. Please try again.';
        message.classList.add('text-red-400');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
